<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Danh Sách Video - Quay Video Đóng Hàng Tự Dộng by Khoata</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell list-shell">
      <header class="app-header">
        <h1>Danh Sách Video</h1>
        <a class="button-link" href="/">Màn hình quay</a>
      </header>

      <section class="videos-panel">
        <form id="filters" class="filters">
          <input name="order_code" placeholder="Mã đơn" />
          <input name="date" type="date" />
          <select name="platform">
            <option value="">Nền tảng</option>
            <option value="shopee">Shopee</option>
            <option value="tiktok">TikTok</option>
            <option value="unknown">Unknown</option>
          </select>
          <select name="status">
            <option value="">Trạng thái</option>
            <option value="recording">Đang quay</option>
            <option value="queued">Chờ nén</option>
            <option value="compressing">Đang nén</option>
            <option value="done">Hoàn tất</option>
            <option value="failed">Lỗi</option>
          </select>
          <button type="submit">Tìm</button>
        </form>
        <div class="table-wrap full-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Thời gian</th>
                <th>Mã đơn</th>
                <th>Nền tảng</th>
                <th>Trạng thái</th>
                <th>Thời lượng</th>
                <th>Dung lượng</th>
                <th>Lỗi</th>
                <th>Xem</th>
                <th>Nén lại</th>
                <th>Thư mục</th>
                <th>Copy</th>
              </tr>
            </thead>
            <tbody id="videos"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/videos.js"></script>
  </body>
</html>

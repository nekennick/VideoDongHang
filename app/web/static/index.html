<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Packing Video System</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="preview-panel">
        <div class="preview-wrap">
          <img id="preview" src="/api/preview.mjpg" alt="Live camera preview" />
          <div class="roi-box" aria-hidden="true"></div>
        </div>
      </section>

      <section class="status-panel">
        <div class="topbar">
          <h1>Packing Video System</h1>
          <span id="state" class="state">IDLE</span>
        </div>
        <div class="metrics">
          <div><span>Mã đang quay</span><strong id="order">-</strong></div>
          <div><span>Nền tảng</span><strong id="platform">unknown</strong></div>
          <div><span>Thời lượng</span><strong id="duration">0.0s</strong></div>
          <div><span>Queue nén</span><strong id="queue">0</strong></div>
          <div><span>Xong hôm nay</span><strong id="done">0</strong></div>
          <div><span>Lỗi hôm nay</span><strong id="failed">0</strong></div>
          <div><span>Ổ trống</span><strong id="disk">0 GB</strong></div>
          <div><span>QR gần nhất</span><strong id="lastQr">-</strong></div>
          <div><span>Camera</span><strong id="camera">checking</strong></div>
        </div>
        <p id="warning" class="warning"></p>
        <button id="openVideosFolder" type="button">Mở thư mục video</button>
        <button id="emergency" class="danger" type="button">Dừng khẩn cấp / Kết thúc ca</button>
      </section>

      <section class="videos-panel">
        <details class="config-panel">
          <summary>Cấu hình nhanh</summary>
          <form id="configForm" class="config-form">
            <label>Camera <input name="camera.index" type="number" min="0" step="1" /></label>
            <label>Rộng <input name="camera.width" type="number" min="1" step="1" /></label>
            <label>Cao <input name="camera.height" type="number" min="1" step="1" /></label>
            <label>FPS <input name="camera.fps" type="number" min="1" step="1" /></label>
            <label>CRF <input name="ffmpeg.crf" type="number" min="0" max="51" step="1" /></label>
            <label>Preset <input name="ffmpeg.preset" /></label>
            <label>Ổ trống tối thiểu (GB) <input name="storage.min_free_disk_gb" type="number" min="0" step="1" /></label>
            <label class="check"><input name="qr.roi_enabled" type="checkbox" /> ROI QR</label>
            <label>ROI X <input name="qr.roi.x" type="number" min="0" max="1" step="0.01" /></label>
            <label>ROI Y <input name="qr.roi.y" type="number" min="0" max="1" step="0.01" /></label>
            <label>ROI W <input name="qr.roi.w" type="number" min="0" max="1" step="0.01" /></label>
            <label>ROI H <input name="qr.roi.h" type="number" min="0" max="1" step="0.01" /></label>
            <button type="submit">Lưu cấu hình</button>
            <span id="configMessage"></span>
          </form>
        </details>

        <form id="filters" class="filters">
          <input name="order_code" placeholder="Mã đơn" />
          <input name="date" type="date" />
          <select name="platform">
            <option value="">Nền tảng</option>
            <option value="shopee">Shopee</option>
            <option value="tiktok">TikTok</option>
            <option value="unknown">Unknown</option>
          </select>
          <select name="status">
            <option value="">Trạng thái</option>
            <option value="recording">recording</option>
            <option value="queued">queued</option>
            <option value="compressing">compressing</option>
            <option value="done">done</option>
            <option value="failed">failed</option>
          </select>
          <button type="submit">Tìm</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Thời gian</th>
                <th>Mã đơn</th>
                <th>Nền tảng</th>
                <th>Trạng thái</th>
                <th>Thời lượng</th>
                <th>Dung lượng</th>
                <th>Lỗi</th>
                <th>Xem</th>
                <th>Nén lại</th>
                <th>Thư mục</th>
                <th>Copy</th>
              </tr>
            </thead>
            <tbody id="videos"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
